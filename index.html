function pdfBrandedHeader(doc, title, subtitle) {
  doc.setFillColor(15,45,94);

  doc.setFillColor(37,99,235);
  doc.rect(0,0,4,22,'F');

}
function pdfFooter(doc,p,t){

}
function pdfSectionLabel(doc,label,y){

    didParseCell:function(data){
      if(data.section==='body'&&data.column.index===4){
        if(data.cell.raw==='RECOMMEND'){data.cell.styles.textColor=[5,150,105];data.cell.styles.fontStyle='bold';}
        else if(data.cell.raw==='HIGH PRICE'){data.cell.styles.textColor=[220,38,38];}
      }
    },
  });
  y=doc.lastAutoTable.finalY+14;
  y=pdfSectionLabel(doc,'KEY COMMERCIAL OBSERVATIONS',y);
  [`Lowest bid: AED ${Number(TOTALS[0]).toLocaleString()} (Al Futtaim Engineering) — ${Math.abs(parseFloat(vsBudget)).toFixed(1)}% below the approved budget of AED 19,000,000.`,
   `Total bid spread: ${spread}% between lowest and highest bid — represents meaningful negotiation headroom.`,
   `Arabtec Build Co. omitted rate for Lifts & Escalators (07.001) — significant scope gap requiring clarification before award.`,
   `Al Futtaim Engineering is recommended for award subject to satisfactory clarification of outstanding risk items.`,
  ].forEach(obs=>{
    doc.setFillColor(37,99,235);doc.circle(20,y+3.5,1.5,'F');
    doc.setFontSize(8.5);doc.setTextColor(51,65,85);doc.setFont('helvetica','normal');
    const lines=doc.splitTextToSize(obs,170);doc.text(lines,25,y+5);y+=lines.length*5.5+5;
  });

  // PAGE 3: COMPARISON MATRIX
  doc.addPage();
  y=pdfBrandedHeader(doc,'BOQ Comparison Matrix — All Line Items','Rate per unit (AED). Green highlight = lowest rate. Red highlight = highest rate.');
  const matrixBody=BOQ_ITEMS.map(item=>{
    const vr=item.rates.filter(r=>r>0);const lo=Math.min(...vr),hi=Math.max(...vr);
    return[item.code,item.desc,item.unit,item.qty.toLocaleString(),
      item.rates[0]===0?'MISSING':Number(item.rates[0]).toLocaleString(),
      item.rates[1]===0?'MISSING':Number(item.rates[1]).toLocaleString(),
      item.rates[2]===0?'MISSING':Number(item.rates[2]).toLocaleString(),
      item.rates[3]===0?'MISSING':Number(item.rates[3]).toLocaleString(),
      ((hi-lo)/lo*100).toFixed(0)+'%'];
  });
  doc.autoTable({startY:y,margin:{left:15,right:15},
    headStyles:{fillColor:[15,45,94],textColor:[255,255,255],fontStyle:'bold',fontSize:7.5},
    bodyStyles:{fontSize:7.5,textColor:[51,65,85]},alternateRowStyles:{fillColor:[248,250,252]},
    columnStyles:{0:{cellWidth:15,halign:'left'},1:{cellWidth:48,halign:'left'},2:{cellWidth:10,halign:'center'},
      3:{cellWidth:14,halign:'right'},4:{cellWidth:22,halign:'right'},5:{cellWidth:22,halign:'right'},
      6:{cellWidth:22,halign:'right'},7:{cellWidth:22,halign:'right'},8:{cellWidth:15,halign:'right'}},
    head:[['Code','Description','Unit','Qty','Al Futtaim','Arabtec','Drake & Scull','ALEC','Spread']],
    body:matrixBody,
    foot:[['','TOTAL BID VALUE (AED)','','',Number(TOTALS[0]).toLocaleString(),Number(TOTALS[1]).toLocaleString(),
      Number(TOTALS[2]).toLocaleString(),Number(TOTALS[3]).toLocaleString(),spread+'%']],
    footStyles:{fillColor:[15,45,94],textColor:[255,255,255],fontStyle:'bold',fontSize:8},
    didParseCell:function(data){
      if(data.section==='body'&&data.column.index>=4&&data.column.index<=7){
        const ri=data.row.index;
        if(ri<BOQ_ITEMS.length){
          const item=BOQ_ITEMS[ri];const ci=data.column.index-4;const r=item.rates[ci];
          const vr=item.rates.filter(x=>x>0);const lo=Math.min(...vr),hi=Math.max(...vr);
          if(r===0){data.cell.styles.textColor=[220,38,38];data.cell.styles.fontStyle='bold';}
          else if(r===lo){data.cell.styles.textColor=[5,150,105];data.cell.styles.fontStyle='bold';data.cell.styles.fillColor=[220,250,240];}
          else if(r===hi){data.cell.styles.textColor=[180,40,40];data.cell.styles.fillColor=[254,242,242];}
        }
      }
      if(data.section==='body'&&data.column.index===8){
        const sp=parseInt(data.cell.raw);
        data.cell.styles.fontStyle='bold';
        if(sp>15)data.cell.styles.textColor=[220,38,38];
        else if(sp>8)data.cell.styles.textColor=[180,110,0];
        else data.cell.styles.textColor=[5,150,105];
      }
    },
  });

  // PAGE 4: NEGOTIATION + RISKS
  doc.addPage();
  y=pdfBrandedHeader(doc,'Negotiation Schedule — Al Futtaim Engineering','Items where submitted rate exceeds market low. Use as basis for pre-award negotiation.');
  const negItems=BOQ_ITEMS.map(item=>{
    const r=item.rates[0];const lo=Math.min(...item.rates.filter(x=>x>0));
    const gap=r>0?r-lo:0;const gapTotal=gap*item.qty;
    return{...item,r,gap,gapTotal,lo,isOutlier:r>0&&(r/lo-1)>0.1};
  }).filter(x=>x.gap>0);
  const totalNeg=negItems.reduce((a,b)=>a+b.gapTotal,0);
  doc.autoTable({startY:y,margin:{left:15,right:15},
    headStyles:{fillColor:[15,45,94],textColor:[255,255,255],fontStyle:'bold',fontSize:8},
    bodyStyles:{fontSize:8,textColor:[51,65,85]},alternateRowStyles:{fillColor:[248,250,252]},
    columnStyles:{0:{cellWidth:15,halign:'left'},1:{cellWidth:59,halign:'left'},2:{cellWidth:24,halign:'right'},
      3:{cellWidth:22,halign:'right'},4:{cellWidth:22,halign:'right'},5:{cellWidth:30,halign:'right'},6:{cellWidth:16,halign:'center'}},
    head:[['Code','Description','Submitted Rate','Lowest Rate','Gap / Unit','Gap (Total)','Flag']],
    body:negItems.map(item=>[item.code,item.desc,Number(item.r).toLocaleString(),Number(item.lo).toLocaleString(),
      '+'+Number(item.gap).toLocaleString(),'AED '+Number(item.gapTotal).toLocaleString(),item.isOutlier?'OUTLIER':'REVIEW']),
    foot:[['','TOTAL NEGOTIATION OPPORTUNITY','','','','AED '+Number(totalNeg).toLocaleString(),'']],
    footStyles:{fillColor:[15,45,94],textColor:[255,255,255],fontStyle:'bold',fontSize:9},
    didParseCell:function(data){
      if(data.section==='body'&&data.column.index===6){
        if(data.cell.raw==='OUTLIER'){data.cell.styles.textColor=[220,38,38];data.cell.styles.fontStyle='bold';}
        else{data.cell.styles.textColor=[180,110,0];}
      }
    },
  });
  y=doc.lastAutoTable.finalY+14;
  y=pdfSectionLabel(doc,'RISK FLAGS',y);
  [{sev:'HIGH',col:[220,38,38],fill:[254,242,242],
    title:'Missing rate — Lifts & Escalators (07.001)',
    detail:'Arabtec Build Co. submitted no rate for item 07.001 (Lifts & Escalators, 8 units). Exposure: AED 1,800,000+. Formal clarification required before award recommendation.'},
   {sev:'MEDIUM',col:[180,110,0],fill:[255,251,235],
    title:'HVAC rate outlier — ALEC Engineering (+14.3% above median)',
    detail:'ALEC HVAC rate (AED 2,400,000) is 14.3% above median. Investigate scope difference or pricing assumption. Exposure: AED 300,000 above median.'},
   {sev:'MEDIUM',col:[180,110,0],fill:[255,251,235],
    title:'Spread on RC Columns & Shear Walls (02.002) — 13.5%',
    detail:'Rate spread exceeds 10% threshold. Al Futtaim at AED 1,850/m³ vs Drake & Scull at AED 2,100/m³. Verify specification assumptions are consistent.'},
   {sev:'LOW',col:[37,99,235],fill:[239,246,255],
    title:'Construction programme missing — Arabtec Build Co.',
    detail:'Construction programme was a mandatory submission item. Arabtec did not provide. Request before advancing to award stage.'},
  ].forEach(r=>{
    if(y>260){doc.addPage();y=pdfBrandedHeader(doc,'Risk Flags (continued)','Marina Views T-2026-001');}
    doc.setFillColor(...r.fill);doc.setDrawColor(...r.col);doc.roundedRect(15,y,180,21,2,2,'FD');
    doc.setFontSize(7.5);doc.setTextColor(...r.col);doc.setFont('helvetica','bold');doc.text(r.sev+' RISK',21,y+7);
    doc.setTextColor(15,45,94);doc.setFontSize(8.5);doc.text(r.title,50,y+7);
    doc.setTextColor(100,116,139);doc.setFontSize(7.5);doc.setFont('helvetica','normal');
    doc.text(doc.splitTextToSize(r.detail,172),21,y+13);y+=25;
  });
  y+=4;if(y>255){doc.addPage();y=20;}
  doc.setFillColor(15,45,94);doc.roundedRect(15,y,180,28,3,3,'F');
  doc.setFontSize(9.5);doc.setTextColor(56,189,248);doc.setFont('helvetica','bold');doc.text('RECOMMENDATION',25,y+9);
  doc.setFontSize(8.5);doc.setTextColor(255,255,255);doc.setFont('helvetica','normal');
  doc.text(`Subject to satisfactory clarification of the risk items above, Al Futtaim Engineering is`,25,y+17);
  doc.text(`recommended for award at AED ${Number(TOTALS[0]).toLocaleString()} — ${Math.abs(parseFloat(vsBudget)).toFixed(1)}% below the approved budget of AED 19,000,000.`,25,y+23);
  // Footers
  const pc3=doc.getNumberOfPages();
  for(let i=2;i<=pc3;i++){doc.setPage(i);pdfFooter(doc,i,pc3);}
  doc.save('Tenderbox_T-2026-001_Analysis_Report.pdf');
}

function AnalysisView({setPage}) {
  const [activeTab, setActiveTab] = useState('matrix');
  const [selectedContractor, setSelectedContractor] = useState(0);
  const spread = ((TOTALS[3]-TOTALS[0])/TOTALS[0]*100).toFixed(1);
  const vsbudget = ((TOTALS[0]-BUDGET)/BUDGET*100).toFixed(1);

  function cellColor(val, rowIdx) {
    if(!val) return {bg:'rgba(220,38,38,.08)',color:'#DC2626'};
    const rowRates = BOQ_ITEMS[rowIdx].rates.filter(r=>r>0);
    const min = Math.min(...rowRates), max = Math.max(...rowRates);
    if(val===min) return {bg:'rgba(5,150,105,.1)',color:'#059669'};
    if(val===max) return {bg:'rgba(220,38,38,.1)',color:'#DC2626'};
    return {bg:'transparent',color:C.gray700};
  }

  const negSchedule = BOQ_ITEMS.map(item => {
    const rate = item.rates[selectedContractor];
    const lowRate = Math.min(...item.rates.filter(r=>r>0));
    const gap = rate>0?rate-lowRate:0;
    const gapTotal = gap*item.qty;
    const isOutlier = rate>0 && (rate/lowRate-1)>0.1;
    return {...item, rate, gap, gapTotal, isOutlier};
  }).filter(r=>r.gap>0);

  return (
    <div>
      <TopBar
        title="Commercial Analysis"
        sub="Marina Views — Main Works · Opened 13 Mar 2026, 09:00"
        actions={[
          <Btn key="e" variant="outline">⬇ Export Excel</Btn>,

        ].map((s,i)=>(
          <Card key={i} style={{padding:18}}>
            <div style={{fontSize:12,color:C.gray500,marginBottom:4}}>{s.label}</div>
            <div style={{fontSize:24,fontWeight:900,color:s.color,letterSpacing:'-0.5px'}}>{s.val}</div>
            <div style={{fontSize:11,color:C.gray400,marginTop:4}}>{s.sub}</div>

                <th style={{padding:'11px 8px',textAlign:'right',color:'rgba(255,255,255,.7)',fontWeight:600,width:65}}>Qty</th>

                  <th key={c.id} style={{padding:'11px 10px',textAlign:'right',color:C.sky,fontWeight:700,width:110}}>{c.shortName}</th>
                ))}
                <th style={{padding:'11px 10px',textAlign:'right',color:C.gold,fontWeight:600,width:80}}>Spread</th>
              </tr>
            </thead>
            <tbody>
              {BOQ_ITEMS.map((item,i)=>{
                const validRates = item.rates.filter(r=>r>0);
                const lo = Math.min(...validRates), hi = Math.max(...validRates);
                const sp = ((hi-lo)/lo*100).toFixed(0);
                return (
                  <tr key={i} style={{background:i%2===0?C.gray50:'white'}}>
                    <td style={{padding:'9px 14px',color:C.gray400,fontFamily:'monospace'}}>{item.code}</td>
                    <td style={{padding:'9px 14px',color:C.navy,fontWeight:500}}>{item.desc}</td>
                    <td style={{padding:'9px 8px',textAlign:'right',color:C.gray500}}>{item.unit}</td>
                    <td style={{padding:'9px 8px',textAlign:'right',color:C.gray700}}>{item.qty.toLocaleString()}</td>
                    {item.rates.map((r,ri)=>{
                      const cc = cellColor(r,i);
                      return <td key={ri} style={{padding:'9px 10px',textAlign:'right',fontWeight:r===lo||r===hi?700:400,...cc}}>
                        {r===0?<span style={{color:C.red,fontWeight:700}}>MISSING</span>:Number(r).toLocaleString()}
                      </td>;
                    })}
                    <td style={{padding:'9px 10px',textAlign:'right',fontWeight:700,color:parseInt(sp)>15?C.red:parseInt(sp)>8?C.gold:C.green}}>{sp}%</td>
                  </tr>
                );
              })}
              {/* Totals row */}
              <tr style={{background:C.navy}}>
                <td colSpan={4} style={{padding:'12px 14px',color:'rgba(255,255,255,.7)',fontWeight:700,fontSize:13}}>TOTAL BID VALUE</td>

                  <td key={i} style={{padding:'12px 10px',textAlign:'right',fontWeight:900,fontSize:14,color:i===0?C.sky:i===3?'#FCA5A5':'white'}}>
                    AED {Number(t).toLocaleString()}
                  </td>
                ))}
                <td style={{padding:'12px 10px',textAlign:'right',fontWeight:700,color:C.gold}}>{spread}%</td>
              </tr>
            </tbody>
          </table>
        </Card>
      )}

      {activeTab==='negotiation' && (
        <div>
          <div style={{display:'flex',gap:8,marginBottom:16}}>
            {CONTRACTORS_BIDDING.map((c,i)=>(
              <div key={i} onClick={()=>setSelectedContractor(i)} style={{

            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr style={{background:C.gray50,borderBottom:`1px solid ${C.gray200}`}}>
                  {['Item','Description','Submitted Rate','Lowest Rate','Gap (Rate)','Gap (Total)','Flag'].map(h=>(

                  ))}
                </tr>
              </thead>
              <tbody>
                {negSchedule.map((item,i)=>(
                  <tr key={i} style={{borderBottom:`1px solid ${C.gray100}`,background:item.isOutlier?'rgba(245,158,11,.04)':'white'}}>
                    <td style={{padding:'9px 12px',color:C.gray400,fontFamily:'monospace'}}>{item.code}</td>
                    <td style={{padding:'9px 12px',color:C.navy,fontWeight:500,maxWidth:180}}>{item.desc}</td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:item.isOutlier?C.red:C.gray700,fontWeight:item.isOutlier?700:400}}>
                      {item.rate===0?'—':Number(item.rate).toLocaleString()}

                    <td style={{padding:'9px 12px',textAlign:'right',color:C.green,fontWeight:600}}>{Number(Math.min(...item.rates.filter(r=>r>0))).toLocaleString()}</td>

                    <td style={{padding:'9px 12px'}}>
                      {item.isOutlier ? <Badge color="red">Outlier</Badge> : <Badge color="gold">Review</Badge>}
                    </td>
                  </tr>
                ))}
                <tr style={{background:C.gray50}}>
                  <td colSpan={5} style={{padding:'11px 12px',fontWeight:700,color:C.navy,fontSize:13}}>Total Negotiation Opportunity</td>

                  <td/>

              </tbody>
            </table>
          </Card>
        </div>
      )}

      {activeTab==='risks' && (
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {[
            {sev:'high',title:'Missing rate — Lifts & Escalators',detail:'Arabtec Build Co. submitted no rate for item 07.001 (Lifts & Escalators, 8 units). This is a significant scope gap. Clarification required before award.',contractor:'Arabtec Build Co.',val:'AED 1,800,000+ exposure'},
            {sev:'medium',title:'HVAC rate outlier — ALEC Engineering',detail:'ALEC Engineering HVAC rate (AED 2,400,000) is 14.3% above the median. Investigate whether this reflects a scope difference or pricing error.',contractor:'ALEC Engineering',val:'AED 300,000 above median'},
            {sev:'medium',title:'Large spread on RC Columns — 13.5%',detail:'Rate spread for RC Columns & Shear Walls exceeds 10%. Al Futtaim at AED 1,850 vs Drake & Scull at AED 2,100/m³. Verify specification assumptions are consistent.',contractor:'All contractors',val:'AED 155,000 total spread'},
            {sev:'low',title:'Programme submitted by 3 of 4 contractors',detail:"Arabtec Build Co. did not submit a construction programme. This was a 'required' submission item. Request before advancing to award.",contractor:'Arabtec Build Co.',val:'Compliance gap'},
          ].map((r,i)=>(
            <Card key={i} style={{borderLeft:`3px solid ${r.sev==='high'?C.red:r.sev==='medium'?C.gold:C.blue}`,padding:'16px 20px'}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <Badge color={r.sev==='high'?'red':r.sev==='medium'?'gold':'blue'}>{r.sev.toUpperCase()} RISK</Badge>
                    <span style={{fontSize:14,fontWeight:700,color:C.navy}}>{r.title}</span>

                  <div style={{display:'flex',gap:16,fontSize:12}}>

    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────
function App() {
  const [role, setRole] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [activeTender, setActiveTender] = useState(null);

  if(!role) return <LoginScreen onLogin={r=>{setRole(r);setPage(r==='contractor'?'portal':r==='auditor'?'audit':'dashboard');}}/>;

  const renderPage = () => {
    switch(page) {
      case 'dashboard':     return <Dashboard setPage={setPage} setActiveTender={setActiveTender}/>;
      case 'tenders':       return <Dashboard setPage={setPage} setActiveTender={setActiveTender}/>;
      case 'tender-detail': return <TenderDetail tender={activeTender} setPage={setPage}/>;
      case 'create-tender': return <CreateTender setPage={setPage}/>;
      case 'opening':       return <OpeningCeremony setPage={setPage}/>;
      case 'analysis':      return <AnalysisView setPage={setPage}/>;
      case 'contractors':   return <ContractorsPage/>;
      case 'audit':         return <AuditLog/>;
      case 'portal':        return <ContractorPortal setPage={setPage}/>;
      default:              return <Dashboard setPage={setPage} setActiveTender={setActiveTender}/>;
    }
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar page={page} setPage={setPage} role={role} onLogout={()=>{setRole(null);setPage('dashboard');}}/>
      <div style={{flex:1,overflow:'auto',padding:28,background:C.gray50}}>
        {renderPage()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
